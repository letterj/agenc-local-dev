services:
  agenc-creator:
    build:
      context: ..
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: agenc-creator
    ports:
      - "3100:3101"
    volumes:
      - agenc-creator-data:/root/.agenc
      - ./creator/config.json:/root/.agenc/config.json:ro
      - ${HOME}/.config/solana/id.json:/root/.config/solana/id.json:ro
    stdin_open: true
    tty: true

  agenc-worker:
    build:
      context: ..
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: agenc-worker
    ports:
      - "3101:3101"
    volumes:
      - agenc-worker-data:/root/.agenc
      - ./worker/config.json:/root/.agenc/config.json:ro
      - ${HOME}/.config/solana/worker.json:/root/.config/solana/id.json:ro
    stdin_open: true
    tty: true

volumes:
  agenc-creator-data:
    driver: local
  agenc-worker-data:
    driver: local
